<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone using HTML & CSS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main">
        <nav>
             <span><img width="80" src="logo.svg" alt=""></span>
             <div>
                <button class="btn ">English</button>
                <button class="btn btn-red-sm">Sign In</button>
             </div>
            </nav>
        <div class="box">

        </div>
        <div class="hero">
            <span class="font">Unlimited movies, shows,</span>
            <span class="font">and more</span>
            <span>Starts at ₹149. Cancel at any time.</span>
            <span>Ready to watch? Enter your email to create or restart your</span>
            <span>membership.</span>
            <div class="hero-buttons">
                <input type="text" placeholder="Email address">
                <button class="btn btn-red">Get Started</button>
            </div>
        </div>
        <div class="separation"></div>
    </div>
</body>

</html>
